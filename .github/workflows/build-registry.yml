name: Build registry

on:
  push:
    branches: [main]
    paths:
      - 'features/**'
      - 'themes/**'
      - 'games/**'
      - 'mods/**'
      - 'scripts/build-registry.mjs'
      - '.github/workflows/build-registry.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-registry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate registry.json
        run: node scripts/build-registry.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- registry.json; then
            echo "registry.json already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git commit -m "chore: regenerate registry.json [skip ci]"
          git push
